name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - 'Source/FikaAmazonAPI/**'
      - 'Source/RestSharp/**'
      - 'Others/icon/**'
      - 'README.md'
      - '.github/workflows/nuget.yml'
  workflow_dispatch:
    inputs:
      package_version:
        description: Optional package version override
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package_id: ${{ steps.version.outputs.package_id }}
      package_version: ${{ steps.version.outputs.package_version }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fetch tags
      run: git fetch --force --tags

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        source-url: https://nuget.pkg.github.com/flipacross/index.json
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine package version
      id: version
      shell: bash
      run: |
        PACKAGE_ID=$(grep -oPm1 '(?<=<PackageId>)[^<]+' ./Source/FikaAmazonAPI/FikaAmazonAPI.csproj)
        BASE_VERSION=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' ./Source/FikaAmazonAPI/FikaAmazonAPI.csproj)
        LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)
        if [ -n "$LATEST_TAG" ]; then
          TAG_VERSION="${LATEST_TAG#v}"
          HIGHEST_BASE=$(printf '%s\n%s\n' "$BASE_VERSION" "$TAG_VERSION" | sort -V | tail -n 1)
          BASE_VERSION="$HIGHEST_BASE"
        fi
        if [ -n "${{ inputs.package_version }}" ]; then
          PACKAGE_VERSION="${{ inputs.package_version }}"
        else
          PACKAGE_VERSION="${BASE_VERSION}-flipacross.${GITHUB_RUN_NUMBER}"
        fi
        echo "package_id=$PACKAGE_ID" >> "$GITHUB_OUTPUT"
        echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
        echo "assembly_version=${BASE_VERSION}.0" >> "$GITHUB_OUTPUT"

    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      id: build-project
      run: >
        dotnet build ./Source/FikaAmazonAPI/FikaAmazonAPI.csproj
        --configuration Release
        --no-restore
        -p:Version=${{ steps.version.outputs.package_version }}
        -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
        -p:FileVersion=${{ steps.version.outputs.assembly_version }}
    
    - name: Pack
      id: pack-project
      run: >
        dotnet pack ./Source/FikaAmazonAPI/FikaAmazonAPI.csproj
        --configuration Release
        --no-build
        --output ./artifacts
        -p:PackageVersion=${{ steps.version.outputs.package_version }}
        -p:Version=${{ steps.version.outputs.package_version }}

    - name: Push package to GitHub Packages
      run: dotnet nuget push "./artifacts/*.nupkg" --source "https://nuget.pkg.github.com/flipacross/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

